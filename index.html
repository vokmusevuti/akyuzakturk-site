<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akyüz & Aktürk Law Firm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --burgundy: #3D0C1B;
    --rose: #B98086;
    --gold: #D4B98C;
    --gold-bright: #E6CFA3;
    --cream: #F3E9DC;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--burgundy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }
  .frame {
    position: fixed;
    inset: 18px;
    border: 1px solid rgba(212, 185, 140, 0.35);
    pointer-events: none;
  }
  .content {
    text-align: center;
    max-width: 560px;
    animation: rise 1.1s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  h1 {
    font-family: 'Cinzel', Georgia, serif;
    font-size: clamp(1.9rem, 5.4vw, 3.4rem);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--gold-bright);
    line-height: 1.3;
  }
  .subtitle {
    margin-top: 0.6rem;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.38em;
    color: var(--cream);
    opacity: 0.75;
  }
  .divider {
    width: 72px;
    height: 1px;
    background: var(--gold);
    opacity: 0.6;
    margin: 2rem auto;
  }
  .message {
    font-size: 16px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--cream);
    opacity: 0.92;
    margin-bottom: 2.25rem;
  }
  .contact {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .contact a {
    color: var(--gold-bright);
    text-decoration: none;
    border-bottom: 1px solid rgba(212, 185, 140, 0.4);
    padding-bottom: 2px;
    transition: color 0.25s, border-color 0.25s;
  }
  .contact a:hover {
    color: var(--cream);
    border-color: var(--cream);
  }
  .contact .sep {
    color: var(--rose);
    margin: 0 0.85em;
  }
  @media (max-width: 480px) {
    .contact { display: flex; flex-direction: column; gap: 0.75rem; }
    .contact .sep { display: none; }
  }
  .lang-toggle {
    position: fixed;
    top: 34px;
    right: 42px;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    z-index: 10;
  }
  .lang-btn {
    background: none;
    border: none;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--cream);
    opacity: 0.5;
    cursor: pointer;
    padding: 4px 2px;
    transition: opacity 0.25s, color 0.25s;
  }
  .lang-btn:hover { opacity: 0.85; }
  .lang-btn.active {
    color: var(--gold-bright);
    opacity: 1;
  }
  .lang-sep {
    color: var(--rose);
    opacity: 0.45;
    font-size: 11px;
  }
  .rights {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 30px;
    text-align: center;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--cream);
    opacity: 0.4;
  }
  @media (max-width: 480px) {
    .lang-toggle { top: 22px; right: 24px; }
    .rights { bottom: 18px; font-size: 10px; padding: 0 1.5rem; }
  }
</style>
</head>
<body>
<div class="frame"></div>
<div class="lang-toggle" role="group" aria-label="Language / Dil seçimi">
  <button type="button" class="lang-btn" data-lang="tr">TR</button>
  <span class="lang-sep">/</span>
  <button type="button" class="lang-btn active" data-lang="en">EN</button>
  <span class="lang-sep">/</span>
  <button type="button" class="lang-btn" data-lang="fr">FR</button>
  <span class="lang-sep">/</span>
  <button type="button" class="lang-btn" data-lang="de">DE</button>
</div>
<div class="content">
  <h1>AKYÜZ &amp; AKTÜRK</h1>
  <p class="subtitle" data-tr="HUKUK BÜROSU" data-en="LAW FIRM" data-fr="CABINET D'AVOCATS" data-de="RECHTSANWALTSKANZLEI">LAW FIRM</p>
  <div class="divider"></div>
  <p class="message"
     data-tr="Web sitemiz yapım aşamasındadır,<br>en kısa sürede hizmetinizde olacaktır.<br>İlginiz için teşekkür ederiz."
     data-en="Our website is under construction<br>and will be available soon.<br>Thank you for your patience."
     data-fr="Notre site web est en cours de construction<br>et sera bientôt disponible.<br>Merci de votre patience."
     data-de="Unsere Website befindet sich im Aufbau<br>und wird in Kürze verfügbar sein.<br>Vielen Dank für Ihr Verständnis.">
    Our website is under construction<br>and will be available soon.<br>Thank you for your patience.
  </p>
  <p class="contact">
    <a href="mailto:info@akyuzakturk.av.tr">info@akyuzakturk.av.tr</a>
    <span class="sep">·</span>
    <a href="tel:+902162220358">+90 (216) 222 03 58</a>
  </p>
</div>
<p class="rights"
   data-tr="© {year} Akyüz &amp; Aktürk Hukuk Bürosu. Tüm hakları saklıdır."
   data-en="© {year} Akyüz &amp; Aktürk Law Firm. All rights reserved."
   data-fr="© {year} Akyüz &amp; Aktürk Cabinet d'Avocats. Tous droits réservés."
   data-de="© {year} Akyüz &amp; Aktürk Rechtsanwaltskanzlei. Alle Rechte vorbehalten.">
  © 2026 Akyüz &amp; Aktürk Law Firm. All rights reserved.
</p>
<script>
  (function () {
    var year = new Date().getFullYear();
    var subtitle = document.querySelector('.subtitle');
    var message = document.querySelector('.message');
    var rights = document.querySelector('.rights');
    var buttons = document.querySelectorAll('.lang-btn');

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      subtitle.textContent = subtitle.getAttribute('data-' + lang);
      message.innerHTML = message.getAttribute('data-' + lang);
      rights.textContent = rights.getAttribute('data-' + lang).replace('{year}', year);
      buttons.forEach(function (btn) {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });
    }

    buttons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        applyLanguage(btn.getAttribute('data-lang'));
      });
    });

    applyLanguage('en');
  })();
</script>
</body>
</html>
