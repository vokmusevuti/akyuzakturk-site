<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akyüz & Aktürk Law Firm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --burgundy: #3D0C1B;
    --rose: #B98086;
    --gold: #D4B98C;
    --gold-bright: #E6CFA3;
    --cream: #F3E9DC;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--burgundy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }
  .frame {
    position: fixed;
    inset: 18px;
    border: 1px solid rgba(212, 185, 140, 0.35);
    pointer-events: none;
  }
  .content {
    text-align: center;
    max-width: 560px;
    animation: rise 1.1s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  h1 {
    font-family: 'Cinzel', Georgia, serif;
    font-size: clamp(1.9rem, 5.4vw, 3.4rem);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--gold-bright);
    line-height: 1.3;
  }
  .subtitle {
    margin-top: 0.6rem;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.38em;
    color: var(--cream);
    opacity: 0.75;
  }
  .divider {
    width: 72px;
    height: 1px;
    background: var(--gold);
    opacity: 0.6;
    margin: 2rem auto;
  }
  .message {
    font-size: 16px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--cream);
    opacity: 0.92;
    margin-bottom: 2.25rem;
  }
  .contact {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .contact a {
    color: var(--gold-bright);
    text-decoration: none;
    border-bottom: 1px solid rgba(212, 185, 140, 0.4);
    padding-bottom: 2px;
    transition: color 0.25s, border-color 0.25s;
  }
  .contact a:hover {
    color: var(--cream);
    border-color: var(--cream);
  }
  .contact .sep {
    color: var(--rose);
    margin: 0 0.85em;
  }
  @media (max-width: 480px) {
    .contact { display: flex; flex-direction: column; gap: 0.75rem; }
    .contact .sep { display: none; }
  }
</style>
</head>
<body>
<div class="frame"></div>
<div class="content">
  <h1>AKYÜZ &amp; AKTÜRK</h1>
  <p class="subtitle">LAW FIRM</p>
  <div class="divider"></div>
  <p class="message">Our website is under construction<br>and will be available soon.<br>Thank you for your patience.</p>
  <p class="contact">
    <a href="mailto:info@akyuzakturk.av.tr">info@akyuzakturk.av.tr</a>
    <span class="sep">·</span>
    <a href="tel:+902162220358">+90 (216) 222 03 58</a>
  </p>
</div>
</body>
</html>
