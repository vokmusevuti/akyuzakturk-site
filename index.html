<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akyüz & Aktürk | Law Firm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #581F26; /* Gül Kurusu & Derin Bordo Dengesi */
            color: #F4E0A5; /* Şampanya Altını */
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            letter-spacing: 4px;
            margin-bottom: 5px;
            font-weight: 700;
            text-transform: uppercase;
        }
        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 8px;
            margin-top: 0;
            margin-bottom: 50px;
            color: #D4AF37;
            text-transform: uppercase;
        }
        .divider {
            width: 60px;
            height: 1px;
            background-color: #D4AF37;
            margin: 0 auto 40px auto;
        }
        p {
            font-size: 1.1rem;
            letter-spacing: 1px;
            line-height: 1.8;
            opacity: 0.9;
            font-weight: 300;
        }
        .contact {
            margin-top: 50px;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            line-height: 1.8;
        }
        .contact a {
            color: #F4E0A5;
            text-decoration: none;
            border-bottom: 1px dashed #D4AF37;
            padding-bottom: 2px;
            transition: opacity 0.3s;
        }
        .contact a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Akyüz &amp; Aktürk</h1>
        <h2>Law Firm</h2>
        
        <div class="divider"></div>
        
        <p>Our website is under construction and will be available soon.<br>Thank you for your patience.</p>
        
        <div class="contact">
            Contact: <a href="mailto:info@akyuzakturk.av.tr">info@akyuzakturk.av.tr</a><br>
            Phone: <a href="tel:+902162220358">+90 (216) 222 03 58</a>
        </div>
    </div>

</body>
</html>
